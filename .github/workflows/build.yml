name: Build and deploy to Github pages

on:
  push:
    branches: [migrate_to_svelte]

env:
  # NOTE: DEPLOY_PATH is only set when using Github pages URL that includes a
  # subpath, not a separate stand-alone domain name pointing to built assets.
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
  PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
  PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
  PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.PUBLIC_GOOGLE_ANALYTICS_ID }}
  PUBLIC_DEPLOY_ENV: ${{ vars.PUBLIC_DEPLOY_ENV }}
  PUBLIC_CONTACT_EMAIL: ${{ vars.PUBLIC_CONTACT_EMAIL }}
  PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
  NODE_OPTIONS: "--max-old-space-size=6144"
  NODE_ENV: production
  # DEBUG: "vite:*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Upload built artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: "public/"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
